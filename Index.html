!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curated by Krishna</title>

<style>
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:white;
font-family:Arial,sans-serif;
background-image:
radial-gradient(circle at top,#2b1b00,#000 60%);
}

.card{
width:360px;
text-align:center;
background:rgba(20,20,20,0.8);
border:1px solid rgba(255,215,0,0.2);
border-radius:30px;
padding:35px;
box-shadow:0 0 30px rgba(255,215,0,0.15);
}

.profile{
width:150px;
height:150px;
object-fit:cover;
border-radius:50%;
border:3px solid #d4af37;
}

h1{
color:#d4af37;
font-size:48px;
margin:20px 0 5px;
}

.artist{
letter-spacing:8px;
color:#ddd;
margin-bottom:25px;
}

.quote{
color:#bbb;
font-style:italic;
margin-bottom:30px;
}

.btn{
display:block;
text-decoration:none;
color:white;
background:#111;
border:1px solid #333;
padding:16px;
border-radius:18px;
margin:15px 0;
transition:0.3s;
}

.btn:hover{
transform:scale(1.03);
border-color:#d4af37;
}

.music{
margin-top:30px;
color:#d4af37;
font-size:14px;
}
</style>
</head>

<body>

<div class="card">

<img src="7.png" class="profile">

<h1>Krishna</h1>
<div class="artist">ARTIST</div>

<div class="quote">
"Art is not what I make,<br>
it's how I see the world."
</div>

<a class="btn"
href="https://www.instagram.com/curatedby.krishna"
target="_blank">
📷 Instagram<br>
@curatedby.krishna
</a>

<a class="btn"
href="https://pin.it/KzfDlMCFf"
target="_blank">
📌 Pinterest
</a>

<div class="music">
🎵 Now Playing: Starboy
</div>

<audio autoplay loop controls>
<source src="Starboy - The Weekend _ English.mp3
" type="audio/mpeg">
</audio>

</div>

</body>
</html>
